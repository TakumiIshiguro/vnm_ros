checkpoint_path: weights/nomad.pth
device: auto
model_type: nomad

common:
  obs_encoder: efficientnet-b0
  mha_num_attention_heads: 4
  mha_num_attention_layers: 4
  mha_ff_dim_factor: 4
  context_type: temporal
  normalize: true
  waypoint_index: 3

vint:
  checkpoint_path: weights/vint.pth
  obs_encoding_size: 512
  late_fusion: false
  context_size: 5
  image_size: [85, 64]
  len_traj_pred: 5
  learn_angle: true

nomad:
  checkpoint_path: weights/nomad.pth
  encoding_size: 256
  context_size: 3
  image_size: [96, 96]
  len_traj_pred: 8
  learn_angle: false
  cond_predict_scale: false
  down_dims: [64, 128, 256]
  num_diffusion_iters: 10
  num_action_samples: 8
  action_noise_scale: 1.0
  action_sample_strategy: cmd_dir
  cmd_dir_target_angles_deg:
    straight: 0.0
    left: 30.0
    right: -30.0
  action_stats:
    min: [-2.5, -4.0]
    max: [5.0, 4.0]
